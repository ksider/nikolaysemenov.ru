<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ExamForge</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">LanguageCert Practice</p>
          <h1>ExamForge</h1>
        </div>
        <div class="topbar-actions">
          <div id="timerPanel" class="timer-panel is-hidden" aria-live="polite"></div>
          <button id="topbarExitBtn" class="secondary-button topbar-exit-button is-hidden" type="button">Exit test</button>
        </div>
      </header>

      <main>
        <section id="startScreen" class="screen start-screen">
          <div class="section-head">
            <div>
              <h2>Choose a test variant</h2>
              <!-- <p>The list is built automatically from JSON files in <code>tests/</code>.</p> -->
            </div>
            <button id="refreshTests" class="icon-button" type="button" title="Refresh list">↻</button>
          </div>

          <div id="testsList" class="tests-grid"></div>

          <div class="settings-grid">
            <fieldset>
              <legend>Timer mode</legend>
              <label class="radio-card">
                <input type="radio" name="timerMode" value="exam" checked />
                <span>
                  <strong>Exam mode</strong>
                  <small>Countdown timer with section lock/check on timeout.</small>
                </span>
              </label>
              <label class="radio-card">
                <input type="radio" name="timerMode" value="practice" />
                <span>
                  <strong>Practice mode</strong>
                  <small>Count-up timer without hard locking.</small>
                </span>
              </label>
            </fieldset>

            <fieldset>
              <legend>Timer scope</legend>
              <label class="radio-card">
                <input type="radio" name="timerScope" value="section" checked />
                <span>
                  <strong>Per section</strong>
                  <small>Listening, Reading and Writing each use their own time limit.</small>
                </span>
              </label>
              <label class="radio-card">
                <input type="radio" name="timerScope" value="test" />
                <span>
                  <strong>Whole test</strong>
                  <small>Total time is calculated from all section limits.</small>
                </span>
              </label>
            </fieldset>
          </div>

          <button id="startBtn" class="primary-button" type="button" disabled>Start test</button>

          <section class="local-results">
            <h3>Recent local results</h3>
            <div id="resultHistory" class="result-history"></div>
          </section>
        </section>

        <section id="examScreen" class="screen is-hidden">
          <nav id="sectionTabs" class="tabs" aria-label="Exam sections"></nav>
          <div id="examContent"></div>
        </section>

        <section id="resultsScreen" class="screen is-hidden">
          <div class="section-head">
            <div>
              <h2>Test results</h2>
              <p id="resultSubtitle"></p>
            </div>
            <button id="restartBtn" class="secondary-button" type="button">Back to tests</button>
          </div>
          <div id="resultsContent" class="results-grid"></div>
        </section>
      </main>
    </div>

DF TEMP/LCG PP1","reading_listening_pdf":"LC General Practice Paper 1 - Exam Paper (LR).pdf","writing_pdf":"LC General Practice Paper 1 - Exam Paper (W).pdf","mark_scheme_pdf":"LC General Practice Paper 1 - Mark Scheme.pdf"},"timer":{"listening_minutes":35,"reading_minutes":50,"writing_minutes":45},"sections":[{"id":"listening","title":"Listening","audio":"/audio/test_1_listening.mp3","parts":[{"id":"part_1","title":"Part 1","type":"multiple_choice","instructions":"You will hear some short conversations. You will hear each conversation twice. Choose the correct answer to complete each conversation.","questions":[{"number":1,"prompt":"Conversation 1","options":["a) Shall we look it up later?","b) OK, how about a coffee, then?","c) Well, it was good to catch up."],"correct":"b) OK, how about a coffee, then?"},{"number":2,"prompt":"Conversation 2","options":["a) I don't know you. What would you like?","b) I can speak with you later.","c) Her line's engaged. Will you hold?"],"correct":"c) Her line's engaged. Will you hold?"},{"number":3,"prompt":"Conversation 3","options":["a) It's a dream come true!","b) Well, think hard before you accept.","c) I don't know if that's what they meant."],"correct":"b) Well, think hard before you accept."},{"number":4,"prompt":"Conversation 4","options":["a) So, you didn't know?","b) Just a couple of days, I think.","c) Actually, not until next week."],"correct":"c) Actually, not until next week."},{"number":5,"prompt":"Conversation 5","options":["a) We'd save money in the long run, though.","b) What's the most we can make out of it?","c) We've created a very good impression."],"correct":"a) We'd save money in the long run, though."},{"number":6,"prompt":"Conversation 6","options":["a) I'm pretty sure that's what he said.","b) Will you tell us what you've found?","c) I'll see if his secretary knows anything."],"correct":"c) I'll see if his secretary knows anything."},{"number":7,"prompt":"Conversation 7","options":["a) After all, there's no harm in trying, is there?","b) It's a shame because their samples were tasty enough.","c) I seem to have developed quite a taste for it."],"correct":"b) It's a shame because their samples were tasty enough."}]},{"id":"part_2","title":"Part 2","type":"multiple_choice","instructions":"You will hear five conversations. Listen to the conversations and answer the questions. Choose the correct answer.","questions":[{"number":8,"prompt":"What does the owner say about the table in the apartment?","options":["a) She'll find out who damaged it.","b) She agrees that it needs replacing.","c) She wasn't aware of a problem with it."],"correct":"c) She wasn't aware of a problem with it."},{"number":9,"prompt":"When the man asks about car parking in the area, she explains that","options":["a) getting permission is complicated.","b) public transport may be more convenient than driving.","c) she doesn't own a car so is unable to give advice about it."],"correct":"b) public transport may be more convenient than driving."},{"number":10,"prompt":"How does the man know the visitor?","options":["a) They studied in the same place.","b) They've worked together before.","c) They met at a marketing conference."],"correct":"b) They've worked together before."},{"number":11,"prompt":"What does the woman want him to do?","options":["a) give the visitor a tour of the factory","b) prepare a presentation for the visitor","c) collect the visitor from the airport"],"correct":"a) give the visitor a tour of the factory"},{"number":12,"prompt":"What do we learn about the man from the conversation?","options":["a) He works in a different shop from the woman.","b) He is already working with a friend.","c) He has had his job for under a year."],"correct":"c) He has had his job for under a year."},{"number":13,"prompt":"What does the man say about his induction?","options":["a) He expected to spend more time in the shop itself.","b) He thought it was useful training.","c) He found some of it a bit boring."],"correct":"a) He expected to spend more time in the shop itself."},{"number":14,"prompt":"In the woman's opinion, the changes will","options":["a) allow them to seat more customers.","b) make the interior feel bigger.","c) give the restaurant a unique look."],"correct":"b) make the interior feel bigger."},{"number":15,"prompt":"What does the man regret not doing?","options":["a) involving all the staff in the first phase","b) adding more storage spaces","c) seeking additional finance"],"correct":"b) adding more storage spaces"},{"number":16,"prompt":"They agree that","options":["a) being new makes people reluctant to trust you.","b) it's a problem if managers don't make things clear.","c) not being familiar with everything can be worrying."],"correct":"c) not being familiar with everything can be worrying."},{"number":17,"prompt":"When they are discussing the new contract, the woman","options":["a) decides that she needs to change the subject.","b) realises that she's said something inaccurate.","c) offers two possible explanations for something."],"correct":"b) realises that she's said something inaccurate."}]},{"id":"part_3","title":"Part 3","type":"gap_fill","instructions":"You will hear someone talking. Complete the information on the notepad. Write short answers of one to three words.","questions":[{"number":18,"prompt":"Key thing interviewers are looking for","correct":["interest in knowledge","an interest in knowledge"]},{"number":19,"prompt":"As a child, Sandra particularly loved visiting","correct":["art galleries"]},{"number":20,"prompt":"Section of museum Sandra has spent most time in","correct":["local history","the local history","local history section","the local history section","local history one"]},{"number":21,"prompt":"Preferred task among museum assistants","correct":["making displays","making new displays"]},{"number":22,"prompt":"What Sandra enjoyed doing with young children","correct":["treasure hunt","a treasure hunt","organising treasure hunt","organising a treasure hunt"]},{"number":23,"prompt":"Current exhibition at Sandra's museum","correct":["world maps","the world maps","world maps exhibition","the world maps exhibition"]},{"number":24,"prompt":"Topic of new qualification a museum employee has taken","correct":["visitor services","diploma in visitor services"]}]},{"id":"part_4","title":"Part 4","type":"multiple_choice","instructions":"You will hear a conversation. You will hear the conversation twice. Choose the correct answers.","questions":[{"number":25,"prompt":"What point is made about the swimming pool in town?","options":["a) The glass windows aren't popular with swimmers.","b) The changing rooms are sometimes dirty.","c) The water could be a bit warmer."],"correct":"c) The water could be a bit warmer."},{"number":26,"prompt":"The man and woman both say that the sports centre","options":["a) is well used by the local community.","b) has a perfect location.","c) is better than others in their region."],"correct":"b) has a perfect location."},{"number":27,"prompt":"An Olympic rower was chosen to open the sports centre because","options":["a) he had grown up in the area.","b) his sport was important in the area.","c) he was in the area for a big sports event."],"correct":"a) he had grown up in the area."},{"number":28,"prompt":"Why was the man fined in the town's main car park?","options":["a) He parked in the wrong place.","b) He left his car there for too long.","c) He failed to show the necessary document."],"correct":"c) He failed to show the necessary document."},{"number":29,"prompt":"The man and woman agree that the library","options":["a) can get too crowded.","b) has some badly trained staff.","c) isn't available as often as it could be."],"correct":"c) isn't available as often as it could be."},{"number":30,"prompt":"When talking about the recycling centre, what surprises the man?","options":["a) that the woman had to pay when she used it","b) that the woman doesn't go there more often","c) that the woman had trouble finding it"],"correct":"b) that the woman doesn't go there more often"}]}]},{"id":"reading","title":"Reading","parts":[{"id":"part_1a","title":"Part 1a","type":"multiple_choice","instructions":"Read the sentences below and decide which option can best replace the word or words in bold so that the meaning remains the same.","questions":[{"number":1,"prompt":"Fill in the application form and send it to the email address provided below.","highlight":"Fill in","options":["a) insert","b) write","c) inform","d) complete"],"correct":"d) complete"},{"number":2,"prompt":"Tomas keeps himself active all the time - he always has something to do.","highlight":"active","options":["a) energetic","b) busy","c) lively","d) fit"],"correct":"b) busy"},{"number":3,"prompt":"Swimming is an extremely effective form of exercise for people of all ages and so should be encouraged in children from a young age.","highlight":"effective","options":["a) helpful","b) capable","c) adequate","d) forceful"],"correct":"a) helpful"},{"number":4,"prompt":"People's views on life change as a result of gaining knowledge, therefore ongoing education is essential for personal development.","highlight":"essential","options":["a) positive","b) suitable","c) necessary","d) convenient"],"correct":"c) necessary"},{"number":5,"prompt":"Over 70% of global coconut oil production comes from the Philippines and Indonesia, and it is used in products as diverse as medicines, cosmetics and foodstuffs.","highlight":"diverse","options":["a) opposite","b) separate","c) varied","d) differing"],"correct":"c) varied"},{"number":6,"prompt":"Effective sports coaches are capable of successfully adapting their coaching style to suit the needs of those they train, and this flexible approach brings rewards.","highlight":"approach","options":["a) capacity","b) attitude","c) objective","d) commitment"],"correct":"b) attitude"}]},{"id":"part_1b","title":"Part 1b","type":"multiple_choice","instructions":"Read the text and decide which option best fits each gap.","passage":"Performance reviews\n\nSome bosses are good at performance reviews, but others dislike them as much as you might. A good boss will not only offer criticism, she'll also (7) you for the things you've done well. If that doesn't happen, try asking her what she thought went well last year. You do need to be cautious if you take this (8), however. You don't want her to (9) the impression that you're completely satisfied with your performance. So, only focus briefly (10) the things you did well and quickly move onto the things you can improve. Use your performance review as an opportunity to (11) what you need to do to really contribute to the company.","questions":[{"number":7,"prompt":"Gap 7","options":["a) praise","b) award","c) celebrate"],"correct":"a) praise"},{"number":8,"prompt":"Gap 8","options":["a) manner","b) approach","c) procedure"],"correct":"b) approach"},{"number":9,"prompt":"Gap 9","options":["a) make","b) give","c) get"],"correct":"c) get"},{"number":10,"prompt":"Gap 10","options":["a) at","b) to","c) on"],"correct":"c) on"},{"number":11,"prompt":"Gap 11","options":["a) call in","b) figure out","c) show off"],"correct":"b) figure out"}]},{"id":"part_2","title":"Part 2","type":"sentence_insert","instructions":"Read the text about a visit to Sweden to see the Northern Lights. Use sentences A-G to complete the text. There is one extra sentence.","passage":"A trip to the Arctic Circle to see the Northern Lights\n\nI had come with a tour group to the Abisko Sky Station in northern Sweden, supposedly the best place to get a sight of the wonderful green patterns in the sky. But our admirable guides were looking upwards with disappointment. We hurried to eat our reindeer steaks and assembled in the reception of our hotel, ready to take the chairlifts up to the sky station. However, we knew that the clouds created the wrong conditions to see the Lights. (12) Besides, we'd heard that the lights tend to be strongest after 9 pm. But at 10.30 my toes were freezing in minus 25-degree temperatures, and my spirits were dropping. (13) The scenery was lovely and unfamiliar, but it wasn't the purpose of the trip. On the second evening, we weren't scheduled to go up to the station. (14) But after we'd been doing this for an hour, the temperature dropped to minus 38 degrees. We were, therefore, grateful to come across a cabin, in which we lit a fire.\n\nAt about 9 pm, one of the guides called us outside. We looked up at the great Arctic sky. There was a rainbow arc of citrus green which miraculously changed shape. I experienced pure delight, but it was over all too quickly. (15) For the third and last evening, we went for a trip on horseback, bad weather having kept us inside during the day. This turned out to be a good way of seeing the landscape, as the moon was incredibly bright against the snow. (16) Great for imaginative fantasies maybe, but bad for Aurora Borealis. No matter, I'd seen them and wouldn't forget them. (17) It looked like a rock concert was going on. Now the green, wandering lights became a great white sea creature, tinged with pinks and blues, spinning and dancing. Three nights, two light displays - truly it had been the experience of a lifetime.","options":["A) The lights faded and vanished.","B) Even so, hope is a strong emotion and pushed us all on.","C) It showed up every detail of the trees we passed.","D) Instead, the plan was for us to do a trip into the forest on snowmobiles.","E) But as we went back to our hotel room, I glanced up at the sky.","F) Some of our group had seen the Lights before.","G) As we walked around the following day, we couldn't help feeling a bit disappointed."],"questions":[{"number":12,"prompt":"Gap 12","correct":"B) Even so, hope is a strong emotion and pushed us all on."},{"number":13,"prompt":"Gap 13","correct":"G) As we walked around the following day, we couldn't help feeling a bit disappointed."},{"number":14,"prompt":"Gap 14","correct":"D) Instead, the plan was for us to do a trip into the forest on snowmobiles."},{"number":15,"prompt":"Gap 15","correct":"A) The lights faded and vanished."},{"number":16,"prompt":"Gap 16","correct":"C) It showed up every detail of the trees we passed."},{"number":17,"prompt":"Gap 17","correct":"E) But as we went back to our hotel room, I glanced up at the sky."}]},{"id":"part_3","title":"Part 3","type":"matching","instructions":"Read the four texts about airports. Which text gives you the answer to each question?","passage":"A\nPlans to build a third runway at the airport are causing controversy. Expanding the airport would result in it becoming the largest source of carbon dioxide in the country. The effect on the health of local residents would be a high price to pay. It would also make it impossible for the country to fulfil its commitment to reduce greenhouse gases by 80% by 2050. On the other hand, the airport is already running at 99% capacity, meaning that any minor problem can mean long delays for customers. The chief executive claims it is losing business to four runway airports at other major European cities, at an estimated annual cost of 14 billion pounds.\n\nB\nThe airport is open 24 hours, so don't worry about not having access to the terminal. However, bear in mind that the shops and eating places all have their own opening hours and not a standard one. To find your way around, you can visit or download the Airport Terminal Map. Our facilities were comprehensively reviewed and given a 150m pound redevelopment two years ago, with the aim of improving the customer experience. This includes the addition of some retail units, selling clothing and gifts, and eight more boarding gates.\n\nC\nIt's hard to fault the overall organisation of the place - everything ran smoothly for me. The queues getting in and out of security control are quite long, but that's understandable and everyone puts up with it. The shops are very good - an excellent range - although the prices for basic things like sandwiches and water seemed very high to me. Some more eating places appear to have been added since I was last there a few years ago. One minor gripe: there was virtually nowhere to sit! I'm pleased to hear they're definitely going to do something about this.\n\nD\nAirports used to be places of departure while cities used to be destinations. Now the situation is reversing as residents and workers increasingly travel to emerging airport cities around the world. A number of initiatives worldwide are aiming to turn the traditional pattern on its head. Now we have the concept of the aerotropolis - basically a fully functional airport city. Airports built on this model will become residential, with schools and workplaces, and a much greater variety of shops and restaurants. The presence of greater competition in such places will have a beneficial effect on pricing.","options":["A","B","C","D"],"questions":[{"number":18,"prompt":"Which text is a customer review of an airport?","correct":"C"},{"number":19,"prompt":"Which text presents two sides of a discussion about a current issue?","correct":"A"},{"number":20,"prompt":"Which text is taken from an academic book on airports?","correct":"D"},{"number":21,"prompt":"Which text tells you about a future development within a terminal building in one airport?","correct":"C"},{"number":22,"prompt":"Which text tells you why flights might sometimes be late?","correct":"A"},{"number":23,"prompt":"Which text tells you that more shops have been added recently?","correct":"B"},{"number":24,"prompt":"Which text tells you that one airport has some big competitors?","correct":"A"}]},{"id":"part_4","title":"Part 4","type":"multiple_choice","instructions":"Read the article about a new cycling app and answer the questions.","passage":"The cyclist\nMitchell Grant writes about a new cycling app.\n\nEvery Saturday morning 44-year-old lawyer Bill Colworthy gets out of bed and cycles around the countryside near his home in pursuit of gold cups and medals. He leaves at 7am, so that the rest of the day is free, and he can be back in time to take his eldest son to rugby practice. The confusing part for his family is that he has never met his opponents and the trophies don't exist in the real world. Like thousands of other keen cyclists across the UK, Bill is hunting pixelated prizes that can be displayed and stored digitally. These are available on Strava, the phenomenally popular website and app that uses satellite data recorded on smartphones or portable bike computers, enabling cyclists to record their rides and compete against each other for virtual trophies.\n\nThe first thing Bill does when he returns from a ride is upload all his data to Strava to see how many trophies he's won. \"It's ridiculous, I know,\" he says. \"But when you see yourself improving or beating other people, it's very addictive.\" You even hear stories about cyclists secretly using motorised bikes to set faster times. Indeed, competition can be surprisingly fierce, as Bill's experience confirms. \"For weeks I was in competition with a guy on a road near my home. I would set a new time after work then he would try to beat it the next day.\"\n\nStrava is a free tool which already has millions of users and is also used by runners. Its popularity lies in the fact that users of any ability can find something to boast about. Cyclists compete to be named King or Queen of a particular route - for setting the fastest time over any bit of road in the country. While the fittest riders compete over popular routes such as once around Regent's Park in London, others are happy to defend the stretch of road between the local chip shop and the post box.\n\nBill's wife finds it hard to show much enthusiasm. \"He's forever telling me how far he's cycled and how fast, but I just switch off in my mind - it means nothing to me. I often catch him on the laptop looking at expensive bike parts which he thinks might help him go faster. Then Bill shaved his legs, both for improved aerodynamics and to make it easier to take off bandages should he fall off. That was definitely a step too far.\"\n\nConsidering the extremes a minority of riders are prepared to go to in order to win, it's no surprise that Strava has proved controversial. Critics argue that it turns roads into racetracks. \"We take safety extremely seriously,\" counters Strava spokesperson Elena White. \"For example, we allow our members to flag any piece of road they consider unsafe, and we automatically remove any competing on it.\" She also points out that Strava data is being used by planning agencies in big cities to analyse commuter patterns and develop safer routes.","questions":[{"number":25,"prompt":"In the first paragraph, the writer suggests that Bill","options":["a) would love to become a professional cyclist.","b) has a strong sense of responsibility to his family.","c) only uses the technology because his friends do."],"correct":"b) has a strong sense of responsibility to his family."},{"number":26,"prompt":"In the second paragraph, the writer explains that using Strava","options":["a) can even lead some members to cheat.","b) caused Bill to get involved in an argument.","c) brings out the worst side of Bill's personality."],"correct":"a) can even lead some members to cheat."},{"number":27,"prompt":"What is the writer's main point in the third paragraph?","options":["a) The appeal of Strava is wide-ranging.","b) Cyclists often use Strava to find new routes.","c) Runners and cyclists tend to share a certain characteristic."],"correct":"a) The appeal of Strava is wide-ranging."},{"number":28,"prompt":"The writer says that Bill's wife gets","options":["a) upset when he injures himself cycling.","b) bored when he gives her lots of statistical details.","c) annoyed when he spends money on improving his bike."],"correct":"b) bored when he gives her lots of statistical details."},{"number":29,"prompt":"Strava has been accused of","options":["a) ignoring the views of their members.","b) failing to share safety information.","c) encouraging dangerous activities."],"correct":"c) encouraging dangerous activities."},{"number":30,"prompt":"From the style of this text, it's clear that the writer","options":["a) finds the behaviour of Strava cyclists strange.","b) is interested in the technology used by Strava.","c) is impressed by the nature of Bill's achievements."],"correct":"a) finds the behaviour of Strava cyclists strange."}]}]},{"id":"writing","title":"Writing","parts":[{"id":"part_1","title":"Part 1","type":"long_text","min_words":100,"max_words":150,"prompt":"You recently visited City Zoo. Write a review about it for a travel website. Mention: the range of animals; the food and drink facilities; whether you think it is good value for money.\n\nCome to City Zoo! Amazing animals from every continent. Our daily displays include eagles, dolphins, penguins and elephants. Family ticket - 55 euros, with a free map. Have lunch at our Italian restaurant or at one of our food stalls, or enjoy our new picnic and children's play area."},{"id":"part_2","title":"Part 2","type":"long_text","min_words":150,"max_words":200,"prompt":"You recently moved to another country to work for one year. Write an email to a friend. Describe where you live, what your job is, and the people you have met."}]}]},"test_2.json":{"id":"test_2","title":"LC General Practice 2","source":{"folder":"PDF TEMP/LCG 2 PDFs","reading_listening_pdf":"LC General Test 2 - Exam Paper (LR).pdf","writing_pdf":"LC General Test 2 - Exam Paper (W).pdf","mark_scheme_pdf":"LC General Test 2 - Mark Scheme.pdf"},"timer":{"listening_minutes":35,"reading_minutes":50,"writing_minutes":45},"sections":[{"id":"listening","title":"Listening","audio":"/audio/test_2_listening.mp3","parts":[{"id":"part_1","title":"Part 1","type":"multiple_choice","instructions":"You will hear some short conversations. You will hear ults weren't particularly impressive.","c) They had to spend too much time practising."],"correct":"b) Their results weren't particularly impressive."},{"number":28,"prompt":"When Tom tells Becky about his schoolmates, he","options":["a) complains that they weren't interested in his music.","b) admits that he was influenced by their musical tastes.","c) suggests that he felt under pressure to give up music."],"correct":"b) admits that he was influenced by their musical tastes."},{"number":29,"prompt":"Becky refers to one particular music lesson in order to","options":["a) explain why she feels nervous now.","b) encourage Tom to feel more confident.","c) describe an experience she benefitted from."],"correct":"c) describe an experience she benefitted from."},{"number":30,"prompt":"Tom and Becky agree that the piece they're playing today is","options":["a) very fast.","b) hard to learn.","c) beautiful music."],"correct":"b) hard to learn."}]}]},{"id":"reading","title":"Reading","parts":[{"id":"part_1a","title":"Part 1a","type":"multiple_choice","instructions":"Read the sentences below and decide which option can best replace the word in bold so that the meaning of the sentence remains the same.","questions":[{"number":1,"prompt":"The Prime Minister gave a lot of detail regarding her future plans for the national health system.","highlight":"regarding","options":["a) respecting","b) according","c) during","d) concerning"],"correct":"d) concerning"},{"number":2,"prompt":"The TV reporter was embarrassed when he fell over but it was highly entertaining for the viewers.","highlight":"entertaining","options":["a) funny","b) amusing","c) cheerful","d) witty"],"correct":"b) amusing"},{"number":3,"prompt":"The building project to improve the railway station has finally been approved.","highlight":"approved","options":["a) agreed","b) permitted","c) chosen","d) shown"],"correct":"a) agreed"},{"number":4,"prompt":"It's the teacher's duty to make sure all the students get on the ing"],"correct":"b) setting"},{"number":11,"prompt":"Gap 11","options":["a) rented","b) signed","c) hired"],"correct":"c) hired"}]},{"id":"part_2","title":"Part 2","type":"sentence_insert","instructions":"Read the text about a businessman. Use the sentences to complete the text. Choose the correct sentence for each gap. There is one extra sentence you will not need.","passage":"Harry Selfridge - An American Innovator in London\n\nHarry Gordon Selfridge was born in Wisconsin, USA, in 1858. He left school at 14 to work in a bank and later joined Marshall Field's, a large department store in the city of Chicago. (12) Over the years, however, he worked his way up to become a partner. He married the boss's daughter and became very wealthy. In 1904, he opened his own department store. A few years later, Harry decided to sell up and retire.\n\nHarry and his wife travelled extensively on holiday, including visits to European capital cities. In London, he made a shock discovery. (13) Harry promptly resolved to come out of retirement and launch his own major store in London - Selfridges. It opened in 1909 and proved to be a sensation. In the early 1900s, typical London shops were rather dull and boring, and goods were kept locked away to guard against shoplifters. Shopping was a chore rather than a pleasure. Harry Selfridge redesigned the typical store layout to revolutionise the shopping experience. (14) The assistants were also trained to be helpful but not too pushy. There were fine restaurants with modest prices, a beauty department, and even reading rooms. What is more, a lot of effort was invested in advertising. (15) These were well-lit and there were ever-changing, eye-catching displays of a wide range of exotic goods.\n\nHarry also introduced the idea of special offers, which has been copied by retailers past and present. (16) This was for the express purpose of offering goods at discounted prices. He placed great marketing emphasis on Christmas and coined the slogan 'Only XX shopping days to Christmas'. The store was widely imitated by its competitors.\n\nIn particular, Harry sought to make his store appealing to female customers of all social classes. Selfridges became somewhere they could safely meet friends, browse products and have a good day out. Harry Selfridge is credited with many business quotations. (17) Examples include, 'The customer is always right' and 'The boss says I; the leader says we'.","options":["A) Even more astonishing was that 90,000 people turned up at the opening.","B) One such promotion was the concept of the bargain basement.","C) Customer service and the display of goods were well behind those in the USA.","D) One highly successful method was the shop's own windows.","E) These were repeated to staff to inspire and motivate them.","F) He was initially employed there as a stock boy.","G) To start with, all the goods were put on open display."],"questions":[{"number":12,"prompt":"Gap 12","correct":"F) He was initially employed there as a stock boy."},{"number":13,"prompt":"Gap 13","correct":"C) Customer service and the display of goods were well behind those in the USA."},{"number":14,"prompt":"Gap 14","correct":"G) To start with, all the goods were put on open display."},{"number":15,"prompt":"Gap 15","correct":"D) One highly successful method was the shop's own windows."},{"number":16,"prompt":"Gap 16","correct":"B) One such promotion was the concept of the bargain basement."},{"number":17,"prompt":"Gap 17","correct":"E) These were repeated to staff to inspire and motivate them."}]},{"id":"part_3","title":"Part 3","type":"matching","instructions":"Read the four texts about a TV programme called Master Designs. Which text gives you the answer to each question?","passage":"A\nI was thrilled when our new home in the countryside was featured on the TV show Master Designs. It came as a complete surprise when the judges actually awarded it the title of New Build of the Year. Since then, we have had a lot of attention from the media, and people even drive by the house and stop to stare and take photos. To start with, we got a bit fed up because it felt as if we had no privacy, but we are used to it now. Eventually people will give up coming to have a look, and we will be able to truly enjoy being here.\n\nB\nI was wondering if you saw Master Designs last night. Do you remember the building site we passed when we were walking along the cliff path by your aunt's holiday apartment in the summer? The whole thing was covered in plastic sheeting and looked really bizarre. Well, it was on Master Designs last night. You will not believe it - it has been transformed into a stunning house that looks like a sail. I do not normally bother to watch stuff about houses, but this was fascinating, and not just because we knew the house. If you missed the show, try and find out if it is available to watch on catch-up TV. Honestly, you will not regret it!\n\nC\nMaster Designs will be back on TV screens this Wednesday for the first episode of the new series. This time we feature a range of exciting home-building projects, including the most environmentally-friendly home we have seen in all the five series we have made so far. As usual we will be following each building project from start to finish, including all the highs and lows of the process. We will also be catching up with last year's winners, Josie and Sam Wilkins, to see how their stunning space-saving city home, built from an old garage block, looks one year on.\n\nD\nIt was an honour to receive the invitation to appear as the presenter of Master Designs again this year. I have been with the show since its first series, but I have to say every year the standard of the house designs increases. What I particularly love about doing this show is getting to know the homeowners. I was over the moon when Hans and Esther Block won two years ago for their exceptional design completed on a tiny budget. It proves people wrong who say you have to be wealthy and an expert to construct a property amazing enough to appear on Master Designs.","options":["A","B","C","D"],"questions":[{"number":18,"prompt":"Which text contains a viewer's opinion of a TV programme?","correct":"B"},{"number":19,"prompt":"Which text gives reasons why a house won the TV programme's award?","correct":"D"},{"number":20,"prompt":"Which text has information about a TV programme provided by the broadcaster?","correct":"C"},{"number":21,"prompt":"What is it like to live in a house that has been on Master Designs?","correct":"A"},{"number":22,"prompt":"How long has this programme been on TV?","correct":"C"},{"number":23,"prompt":"Where exactly is the house located?","correct":"B"},{"number":24,"prompt":"Why should viewers consider having a house built?","correct":"D"}]},{"id":"part_4","title":"Part 4","type":"multiple_choice","instructions":"Read the text about working as a Woodland Conservation Manager and answer the questions.","passage":"Claire Inglis - My job as a Woodland Conservation Manager\n\nI graduated with a degree in Art History, and then completed a postgraduate qualification in Museum Studies. Then I began a career in education, working with children with behavioural problems. I found there was great value in enabling such students to access nature and wildlife as it encouraged them to re-engage with learning. As for myself, this sparked a personal interest in conservation and environmental work, and I eventually viewed it as a field I wanted to work in.\n\nMy next step was to take part in local conservation activities, which showed me how rewarding the work could be. This was on a voluntary basis, but it helped me define the particular areas I was interested in. Following many positive experiences, I decided to pursue a career in habitat conservation by going back to university to take a Master's degree. The course served only to confirm my passion for habitat management, and after completing it, I set about looking for jobs.\n\nI had the chance to do a PhD, but I felt it was time to put the ideas I had learnt into practice. I applied for the Woodland Conservation Manager post almost as soon as it was advertised and felt privileged just to be invited for an interview. The Woodland Trust, my employer, was impressed by my background in education, and the transferable skills I could bring to the role. They were also interested in the range of volunteering opportunities I had undertaken.\n\nI have been in my job for about a year now. A typical day for me includes undertaking site visits to assess the condition and development of the woodland, inspecting work undertaken by contractors, writing to-do lists for each of the volunteers, tree safety surveying and monitoring of health risks to different species, checking and updating public access signs, and even checking on grazing cattle. Although I aim to be on site as much as possible, there are times when I need to be at my desk in order to complete administration tasks.\n\nMy office is at my home, rather than at my employer's premises, so some could find this challenging in terms of missing daily interaction with colleagues. I have not experienced this to be an issue. Nor has managing my workload or deciding priorities proved to be a headache. It is sometimes the case, however, that issues arise that require very careful handling, and that can be tricky for me. One example is having to deal with local farmers who disagree with our conservation agenda.\n\nI still consider myself relatively new to the role. However, I have already learned so much through in-house training sessions. Spending time observing other members of staff at work has been invaluable to me, and I am forever grateful for the support that colleagues have generously provided. I always keep reference books handy to look up information on species that are harder to identify. When I meet tree specialists, I am inspired by the passion they show for sharing their knowledge.","questions":[{"number":25,"prompt":"What is Claire Inglis doing in the first paragraph?","options":["a) explaining why she found her first career very stressful","b) describing how she became attracted to a second career","c) comparing her route into conservation with a typical career path"],"correct":"b) describing how she became attracted to a second career"},{"number":26,"prompt":"Claire suggests that one benefit of doing a Master's degree was","options":["a) it proved to be more useful than volunteering.","b) it introduced her to many new aspects of her subject.","c) it convinced her she was studying the right subject."],"correct":"c) it convinced her she was studying the right subject."},{"number":27,"prompt":"What does Claire say about her application for her current job?","options":["a) At one point she nearly decided to withdraw it.","b) She was worried about her level of experience.","c) It was viewed favourably because of her past work."],"correct":"c) It was viewed favourably because of her past work."},{"number":28,"prompt":"As part of her job, Claire has to","options":["a) give tasks to others.","b) cut down diseased trees.","c) show visitors around."],"correct":"a) give tasks to others."},{"number":29,"prompt":"What aspect of her job does Claire find difficult?","options":["a) working by herself","b) defending her approach","c) organising how she spends her time"],"correct":"b) defending her approach"},{"number":30,"prompt":"In the final paragraph, Claire says she feels","options":["a) motivated by the enthusiasm of other people.","b) thankful for the opportunity to share her expertise.","c) proud that she has an interesting and worthwhile job."],"correct":"a) motivated by the enthusiasm of other people."}]}]},{"id":"writing","title":"Writing","parts":[{"id":"part_1","title":"Part 1","type":"long_text","min_words":100,"max_words":150,"prompt":"You recently visited the shopping mall advertised below. Write a review of your visit for a customer review waste management in cities should become","options":["a) a good business opportunity.","b) an increasingly simple process.","c) the responsibility of individuals."],"correct":"a) a good business opportunity."},{"number":29,"prompt":"Why does David refer to Seoul in South Korea?","options":["a) to highlight the ineffectiveness of one particular policy","b) to illustrate how quickly urban environments can change","c) to suggest a model that other cities should follow"],"correct":"c) to suggest a model that other cities should follow"},{"number":30,"prompt":"What effect does Violetta think decentralising cities could have?","options":["a) Food production within them could increase.","b) There could be greater equality across the population.","c) Residents could have higher overall levels of satisfaction."],"correct":"b) There could be greater equality across the population."}]}]},{"id":"reading","title":"Reading","parts":[{"id":"part_1a","title":"Part 1a","type":"multiple_choice","instructions":"Read the sentences below and decide which option can best replace the word in bold so that the meaning remains the same.","questions":[{"number":1,"prompt":"While she was working at the cafe, Suzanne learnt how to make many different kinds of coffee.","options":["a) ways","b) sorts","c) things","d) models"],"correct":"b) sorts","highlight":"kinds"},{"number":2,"prompt":"We apologise, but the meeting has been postponed until tomorrow because one or two people can’t come.","options":["a) got back","b) taken out","c) given up","d) put off"],"correct":"d) put off","highlight":"postponed"},{"number":3,"prompt":"The location of our hotel, right beside the lake, meant it was a wonderful place to stay.","options":["a) position","b) environment","c) region","d) place"],"correct":"a) position","highlight":"location"},{"number":4,"prompt":"The museum was able to acquire a rare and beautiful painting for its collection thanks to the generosity of one of its supporters.","options":["a) capture","b) gather","c) obtain","d) achieve"],"correct":"c) obtain","highlight":"acquire"},{"number":5,"prompt":"Many career officers allow students to remain in contact with them after leaving school or university, as this extra support can be very helpful.","options":["a) hold","b) maintain","c) continue","d) keep"],"correct":"d) keep","highlight":"remain"},{"number":6,"prompt":"I didn’t go home until I was completely satisfied that everyone performing in the show knew exactly what was expected of them.","options":["a) proud","b) certain","c) thrilled","d) dedicated"],"correct":"b) certain","highlight":"satisfied"}]},{"id":"part_1b","title":"Part 1b","type":"multiple_choice","instructions":"Read the text and decide which option best fits each gap.","passage":"Exploring Mars\n\nThe first robots to land on the planet Mars were the two Viking landers, Viking 1 and Viking 2, in the 1970s. The (7) they were sent was to look for signs of life. They were programmed to carry out various experiments, and, at first, it seemed the results were positive. In the end, however, scientists decided the results did not (8) for sure that there was life on the planet.\n\nThere are (9) five robots working on Mars today, and these are called rovers. The advantage of rovers over landers is that rovers can travel across the surface collecting information from different areas. One of these rovers, Curiosity, has been on Mars since 2012. During that time it has discovered that there used to be large (10) of water on the planet, and that the planet’s soil (11) the chemicals that are necessary for life to exist.","questions":[{"number":7,"prompt":"Gap 7","options":["a) reason","b) goal","c) point"],"correct":"a) reason"},{"number":8,"prompt":"Gap 8","options":["a) justify","b) define","c) prove"],"correct":"c) prove"},{"number":9,"prompt":"Gap 9","options":["a) currently","b) lately","c) recently"],"correct":"a) currently"},{"number":10,"prompt":"Gap 10","options":["a) numbers","b) amounts","c) sums"],"correct":"b) amounts"},{"number":11,"prompt":"Gap 11","options":["a) consists","b) involves","c) contains"],"correct":"c) contains"}]},{"id":"part_2","title":"Part 2","type":"sentence_insert","instructions":"Use sentences A-G to complete the text. There is one extra sentence you will not need.","passage":"Is there a future for plastic?\n\nWhen plastic was first invented, it initially seemed to be a miracle material that would solve many of the world’s problems. However, we now know it is a serious threat to the health of the planet. A new exhibition at the V&A museum in Dundee looks back at the history of plastic and asks us to think about its future.\n\n“Until the middle of the 19th century, people turned to the natural world for materials that would perform the functions that plastics now carry out,” explains museum curator Charlotte Hale. (12) For this reason, attempts to create similar materials in the laboratory began. There were some scientific advances but early attempts were not commercially successful.\n\nThe breakthrough came in the early 20th century when Belgian chemist Leo Baekeland invented a type of plastic he called Bakelite. Bakelite was hard and strong, heat resistant, and attractive. It was used to make everything from telephones to jewellery to chess pieces. (13) This appreciation is easy to understand when you look at the stunning examples in the exhibition.\n\nSoon nylon and polyethylene were invented, and in the 1940s companies began to use plastics to produce items for domestic use. (14) These had the desired effect, and soon homes were filled with radios, lamps, clocks and telephones in futuristic curved shapes and bright colours.\n\nAs the 1950s and 60s went on, the increased availability of cheaper items and plastic packaging marked a change in attitudes towards plastic. (15) It’s therefore unlikely to be a coincidence that around this time, marine biologists first published articles on the problem of plastic making its way into the sea.\n\nSince then, the understanding of its environmental impact has grown. (16) For example, it is vital to modern telecommunications and medicine and many other essential aspects of life. When used to wrap food, it can help prevent food waste. It’s true that substitutes made from things like vegetable matter, paper or cotton do now exist. (17) This is why Charlotte Hale is not demanding a zero-plastic world. Instead, she asks governments to introduce strict laws to control its use so we can continue to benefit from this amazing material for decades to come.","options":["A) It began to be thought of as something to be thrown away and replaced, rather than cared for.","B) However, it’s becoming clear that the environmental costs attached to these alternatives are also significant.","C) These objects were highly valued at the time and many went on to become collectors’ pieces.","D) That meant it could be used to create a wide range of luxury items.","E) But the rewards of plastic are still there, and in many ways it remains the wonderful material it always was.","F) The problem was that these were difficult to obtain, and therefore expensive.","G) At the same time, they ran huge marketing campaigns to promote the goods."],"questions":[{"number":12,"prompt":"Gap 12","correct":"F) The problem was that these were difficult to obtain, and therefore expensive."},{"number":13,"prompt":"Gap 13","correct":"C) These objects were highly valued at the time and many went on to become collectors’ pieces."},{"number":14,"prompt":"Gap 14","correct":"G) At the same time, they ran huge marketing campaigns to promote the goods."},{"number":15,"prompt":"Gap 15","correct":"A) It began to be thought of as something to be thrown away and replaced, rather than cared for."},{"number":16,"prompt":"Gap 16","correct":"E) But the rewards of plastic are still there, and in many ways it remains the wonderful material it always was."},{"number":17,"prompt":"Gap 17","correct":"B) However, it’s becoming clear that the environmental costs attached to these alternatives are also significant."}]},{"id":"part_3","title":"Part 3","type":"matching","instructions":"Read the four texts about memory. Which text gives you the answer to each question?","passage":"A\nWhen I told people I was going to write a book on memory, I saw “Good luck with that!” written on a few faces. Memory is such a massive topic. My interest is in what is called autobiographical memory - the memories we have for the events of our own lives. Several decades of research tell us that every time we recall these kinds of memories, our brains re-invent them slightly to match our current beliefs. However, survey after survey tells us that many people remain convinced that memories once made, are forever fixed. Why is this the case? One possible reason is that memories are precious to us: they define us in many ways, and so we are horrified by the idea that they are unreliable. That is what I wanted to explore in my book.\n\nB\nThe techniques we teach on this memory course are relatively easy to learn and their effectiveness is backed up by research. Some people are of the view that being able to hold information in your brain is not necessary in an age where so much information is immediately available online. We disagree: our memories work by linking different ideas to each other. As well as being crucial to memory, this is also the basis of creative thinking. Since careers in the future are likely to be less concerned with repetitive tasks that can be done by computers and more about being creative, having a good memory will become more, not less, important in the future.\n\nC\nWe’re living in the most photographed era of history and as a psychologist I’m fascinated by the effect this is having on our memories. I’ve long wondered whether the act of taking pictures affects the way we make memories of our experiences. And it now seems this may be the case. In a recent experiment, a scientist took people around a museum and asked them to take photos of some exhibits but not others. They found people had worse memories of the things they had photographed than the things they hadn’t. It’s as if having a picture of something means you don’t need to make a strong memory of it. Your brain seems to be saying, “It’s OK, I can always look at the picture if I need the information.”\n\nD\nThis new book on the science of memory explores the reasons why we retain so few memories from early childhood. From about the age of 6 or 7, many of the early autobiographical memories we’ve made begin to gradually fade away. Scientists have known about this for more than a century but it’s only in the past decade that they’ve begun to figure out why it happens. As you will discover within the pages of this book, it seems to be because the brain systems responsible for autobiographical memory aren’t fully formed in young children. It’s not that they don’t work at all, it’s just that they don’t work as well as they are going to in later childhood and in adulthood.","options":["A","B","C","D"],"questions":[{"number":18,"prompt":"Mention a suspicion they had that turns out to be correct.","correct":"C"},{"number":19,"prompt":"Suggest that developing our memory can improve another skill.","correct":"B"},{"number":20,"prompt":"Point out that most of us hold a mistaken belief about how one kind of memory works.","correct":"A"},{"number":21,"prompt":"Explain the likely cause of a certain type of memory loss.","correct":"D"},{"number":22,"prompt":"Argue against the idea that being able to remember things matters less these days.","correct":"B"},{"number":23,"prompt":"Explain why the brain may sometimes choose not to remember something.","correct":"C"},{"number":24,"prompt":"Describe the reaction they got after revealing a plan.","correct":"A"}]},{"id":"part_4","title":"Part 4","type":"multiple_choice","instructions":"Read the review of a book about the internet and answer the questions.","passage":"Andrew Miller reviews: “How a Generation Shaped, Destroyed and Survived the Internet” by Marie Le Conte\n\nThere are, broadly speaking, three generations of humans alive right now with distinct experiences of the internet. There are people - such as myself - of middle age and upwards, who reached adulthood without googling anything, sending an email, having a social media account or owning a mobile phone. At the opposite end of the spectrum are people in their mid-20s and younger, for whom the online world is as taken for granted as electric light. The author and journalist Marie Le Conte is of the generation between.\n\nShe was born in 1991, and reckons she probably went online for the first time towards the end of that decade. New technologies are usually adopted first by the young, and it seems Le Conte was no exception to this rule. She launched a blog when she was 12, and a website about rock music when she was 15. She now has over 90,000 followers on Twitter. “Mine has been a life lived online,” she says in the introduction to her book, “and if you remove the life I have led on there, it leaves me with no life at all.”\n\nThis is in no way a complaint. Le Conte is clear that her time online has largely been tremendous fun, and she has many amusing stories to prove it. But her view of the internet now is similar to that of an early fan of a once unknown rock band that has become immensely famous. The fan finds themselves crowded into the back of some huge arena, thinking, “Who are all these awful people?”\n\nLe Conte uses a mixture of interviews and personal reflections to chart the internet’s course from its initial arrangement as a landscape of small “villages”, each with its own rules, conventions and traditions, to today’s much more centralised arrangement, where much, if not most, online activity is filtered through just a handful of social media platforms. The villages have become cities, and just like city-living in the real world, this has advantages and disadvantages. In the physical world, humanity has learnt to cope with city life by allowing our fellow citizens to say, do, believe, wear, and consume what they please so long as they don’t bother us with it. Online, you may have noticed, it does not work like that: social media is full of people for whom being angry in public, very often about nothing at all, has become a hobby, if not a job.\n\nLe Conte takes issue, and persuasively so, with the conventional wisdom that social media places us all into “echo chambers”, where our own views are reflected back at us. The actual difficulty, she suggests, is the opposite. By way of example, she describes a recent social media storm she accidentally set off. She posted what she thought was an amusing tweet about living within earshot of an opera singer. It was soon shared with another opera singer, and before long Le Conte found herself under attack by many opera singers who objected furiously to her tweet. For Le Conte it is a cause of much sorrow that the internet spaces we occupy these days make us feel tense because we never feel truly safe in them.","questions":[{"number":25,"prompt":"What does Andrew Miller say about young people in the first paragraph?","options":["a) They don’t give the existence of the internet a great deal of thought.","b) They can’t understand how people managed their lives before the internet.","c) They aren’t aware of the difficulties older people have when using the internet."],"correct":"a) They don’t give the existence of the internet a great deal of thought."},{"number":26,"prompt":"What do we learn about Marie Le Conte from the second paragraph?","options":["a) She made full use of the internet as soon as she was able to.","b) Her early confidence in the internet was unusual for the time.","c) She has no memory of the period before the internet was invented."],"correct":"a) She made full use of the internet as soon as she was able to."},{"number":27,"prompt":"Andrew Miller refers to “villages” in the fourth paragraph in order to","options":["a) highlight the lack of privacy that’s always been a feature of online world.","b) give an idea of the kind of people who were initially attracted to the internet.","c) illustrate how online communities used to be separate from one another."],"correct":"c) illustrate how online communities used to be separate from one another."},{"number":28,"prompt":"What is the writer’s main point in the fourth paragraph?","options":["a) It is difficult to predict the outcome when large numbers of people connect online.","b) It is likely that over time internet users will become more tolerant of one another.","c) It is unfortunate that people don’t behave online as they would in person."],"correct":"c) It is unfortunate that people don’t behave online as they would in person."},{"number":29,"prompt":"What problem with social media does the writer describe in the final paragraph?","options":["a) how it pushes people to hold certain views","b) the way comments can spread quickly across it","c) the lack of agreement among experts as to how to improve it"],"correct":"b) the way comments can spread quickly across it"},{"number":30,"prompt":"What impression do we get of Marie Le Conte from this text as a whole?","options":["a) She is sad that most people have not benefited much from the internet.","b) She has some regrets about the way she has used the internet in the past.","c) She is grateful that she experienced the internet as it was in its early days."],"correct":"c) She is grateful that she experienced the internet as it was in its early days."}]}]},{"id":"writing","title":"Writing","parts":[{"id":"part_1","title":"Part 1","type":"long_text","min_words":100,"max_words":150,"prompt":"You see the following job advertisement online. Write an email applying for one of the jobs. In your email: say which job you’re interested in; give details of any experience you have; say why you think you’d be good at the job.\n\nCo
